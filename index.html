<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noise Detector</title>
    <style>
        
    </style>
</head>
<body>
    <div class="card">
        <div class="group-list">
            <h3>Project Group Members</h3>
            <p>1. Bashir Nuhu</p>
            <p>2. Abdul'hafeez Jimoh</p>
            <p>3. Halimatu Yusuf Dauda</p>
            <p>4. Iklima Abdullahi</p>
            <p>5. Amina Auwal</p>
        </div>

        <h1>Noise Detector</h1>
        
        <div id="status">Status: Ready</div>
        
        <div id="meter-container">
            <div id="filler"></div>
        </div>

        <div class="sensitivity-box">
            <label>Sensitivity</label>
            <input type="range" id="threshold" min="0" max="100" value="45">
        </div>

        <div class="controls">
            <button id="startButton">Start</button>
            <button id="stopButton" disabled>Stop</button>
        </div>

        <audio id="alarmSound" src="Burglar_Alarm_4.mp3" preload="auto" loop></audio>
    </div>

    <script>
        let audioContext, stream, analyzer, animationId;

        const startButton = document.getElementById('startButton');
        const stopButton = document.getElementById('stopButton');
        const filler = document.getElementById('filler');
        const status = document.getElementById('status');
        const thresholdInput = document.getElementById('threshold');
        const alarm = document.getElementById('alarmSound');

        async function startMonitoring() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(stream);
                analyzer = audioContext.createAnalyser();
                analyzer.fftSize = 256;
                source.connect(analyzer);
                const dataArray = new Uint8Array(analyzer.frequencyBinCount);
                
                startButton.disabled = true;
                stopButton.disabled = false;
                status.innerText = "Monitoring...";

                function update() {
                    analyzer.getByteFrequencyData(dataArray);
                    let sum = 0;
                    for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                    let volume = Math.min((sum / dataArray.length) * 1.2, 100);

                    filler.style.width = volume + "%";
                    const limit = parseInt(thresholdInput.value);

                    if (volume > limit) {
                        filler.style.background = "#ff4757";
                        status.innerText = "TOO LOUD!";
                        status.style.color = "#ff4757";
                        
                        if (alarm.paused) {
                            alarm.play().catch(e => console.log("Playback blocked", e));
                        }
                    } else {
                        if (!alarm.paused) {
                            alarm.pause();
                            alarm.currentTime = 0; 
                        }

                        if (volume > limit * 0.7) {
                            filler.style.background = "#ffa502";
                            status.innerText = "Warning...";
                            status.style.color = "#ffa502";
                        } else {
                            filler.style.background = "#2ed573";
                            status.innerText = "Perfectly Quiet";
                            status.style.color = "#2f3542";
                        }
                    }

                    animationId = requestAnimationFrame(update);
                }
                update();
            } catch (err) { 
                alert("Microphone access is required for this app to work."); 
            }
        }

        function stopMonitoring() {
            cancelAnimationFrame(animationId);
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
            }
            if (audioContext) {
                audioContext.close();
            }
            alarm.pause();
            alarm.currentTime = 0;

            startButton.disabled = false;
            stopButton.disabled = true;
            status.innerText = "Monitor Paused";
            status.style.color = "#2f3542";
            filler.style.width = "0%";
        }

        startButton.onclick = startMonitoring;
        stopButton.onclick = stopMonitoring;
        
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW failed', err));
            });
        }
    </script>
</body>
</html>

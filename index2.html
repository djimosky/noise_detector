<!DOCTYPE html>

<html lang="en">

<head>

<link rel="manifest" href="manifest.json">

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Noise Detector</title>

<style>

body {

font-family: 'Segoe UI' sans-serif;

display:

flex-direction: column;

align-items: center;

justify-content: center;

min-height: 100vh;

background: #f8f9fa;

margin: 0;

padding: 20px;

}

.card {

background: white;

padding: 2rem;

border-radius: 20px;

box-shadow: 0 10px 30px rgba(0,0,0,0.1);

text-align: center;

width: 100%;

max-width: 400px;

}

.group-list {

text-left;

background: #f1f3f5;

padding: 15px;

border-radius: 10px;

margin-bottom: 20px;

}

.group-list h3 {

margin-top: 0;

font-size: 1rem;

color: #444;

border-bottom: solid #ddd;

padding-bottom: 5px;

}

.group-list p {

margin: 5px 0;

font-size: 0.9rem;

color: #666;

}

h1 {

font-size: 1.5rem;

color: #333;

margin-top: 0;

}

#status {

font-size: 1.1rem;

margin-bottom: 10px;

font-weight: bold;

height: 1.5rem;

}

#meter-container {

width: 100%;

height: 30px;

background: #eee;

border-radius: 15px;

overflow: hidden;

margin: 20px 0;

border: 1px solid #ddd;

}

#filler {

width: 0%;

height: 100%;

background: #2ed573;

transition: width 0.1s;

}

.controls {

margin-top: 10px;

}

.controls button {

padding: 12px 25px;

cursor: pointer;

border: none;

border-radius: 8px;

font-weight: bold;

margin: 5px;

transition: 0.2s;

}

#startButton {

background: #28a745;

color: white;

}

#stopButton {

background: #dc3545;

color: white;

}

#startButton:disabled #stopButton:disabled {

background: #ccc;

cursor: not-allowed;

}

.sensitivity-box {

margin-top: 15px;

background: #f8f9fa;

padding: 10px;

border-radius: 8px;

}

input[type=range] {

width: 100%;

cursor: pointer;

}

</style>

</head>

<body>

<div class="card">

<div class="group-list">

<h3>Project Group Members</h3>

<p>1. Bashir Nuhu</p>

<p>2. Abdul'hafeez Jimoh</p>

<p>3. Halimatu Yusuf Dauda</p>

<p>4. Iklima Abdullahi</p>

<p>5. Amina Auwal</p>

</div>

<h1>Noise Detector</h1>

<div id="status">Status: Ready</div>

<div id="meter-container">

<div id="filler"></div>

</div>

<div class="sensitivity-box">

<label>Sensitivity</label>

<input type="range" id="threshold" min="0" max="100" value="45">

</div>

<div class="controls">

<button id="startButton">Start</button>

<button id="stopButton" disabled>Stop</button>

</div>

<audio src="Burglar_Alarm_4.mp3" preload="auto" loop></audio>

</div>

<script>

let audioContext, stream, analyzer, animationId;

const startButton = document.getElementById('startButton');

const stopButton = document.getElementById('stopButton');

const filler = document.getElementById('filler');

status = document.getElementById('status);

const thresholdInput = document.getElementById('threshold');

const alarm = document.getElementById('alarmSound');

async function startMonitoring() {

try {

// Get access to the users microphone

stream = await navigator.mediaDevices.getUserMedia({ audio: true });

// Create an audio context

audioContext = new (window.AudioContext || window.webkitAudioContext)();

// Create a media stream source

const source = audioContext.createMediaStreamSource(stream);

// Create an analyzer

analyzer = audioContext.createAnalyser();

analyzer.fftSize = 256;

// Connect the source to the analyzer

source.connect(analyzer);

// Create a data array to store the frequency data

const dataArray = Uint8Array(analyzer.frequencyBinCount);

// Disable the start button and enable the stop button

startButton.disabled = true;

stopButton.disabled =

status.innerText = "Monitoring...";

function update() {

// Get the frequency data

analyzer.getByteFrequencyData(dataArray);

// Calculate the volume

let sum = 0;

for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];

let volume = Math.min((sum / dataArray.length) * 1.2, 100);

// Update the filler width

filler.style.width = volume. %";

// Get the threshold value

const limit = parseInt(thresholdInput.value);

if (volume > limit) {

// If the volume is too loud change the filler color and status text

filler.style.background = "#ff4757";

status.innerText = "TOO LOUD!";

status.style.color = "#ff4757";

// Play the alarm sound if its not already playing

if (alarm.paused) {

alarm.play().catch(e => console.log("Playback blocked" e));

}

}

// If the volume is not too loud pause the alarm sound

if (!alarm.paused) {

alarm.pause();

alarm.currentTime = 0;

}

if (volume > limit * 0.7) {

// If the volume is above 70% of the threshold change the filler color and status text

filler.style.background = "#ffa502";

status.innerText = "Warning...";

status.style.color = "#ffa502";

} else {

// If the volume is below 70% of the threshold change the filler color and status text

filler.style.background = "#2ed573";

status.innerText = "Perfectly Quiet";

status.style.color = "#2f3542";

}

}

// Request the frame

animationId = requestAnimationFrame(update);

}

update();

} catch (err) {

// If theres an error alert the user

alert("Microphone access is required for this app to work.");

}

}

function stopMonitoring() {

// Cancel the animation frame

cancelAnimationFrame(animationId);

// Stop the stream

if (stream) {

stream.getTracks().forEach(t => t.stop());

}

// Close the context

if (audioContext) {

audioContext.close();

}

// Pause the alarm sound

alarm.pause();

alarm.currentTime = 0;

// Enable the start button and disable the stop button

startButton.disabled = false;

stopButton.disabled = true;

status.innerText = "Monitor Paused";

status.style.color = "#2f3542";

filler.style.width = "0%";

}

// Add event listeners to the buttons

startButton.onclick = startMonitoring;

stopButton.onclick = stopMonitoring;

// Register the service worker

if ('serviceWorker', in navigator) {

window.addEventListener('load' () => {

navigator.serviceWorker.register('sw.js).catch(err => console.log('SW failed' err));

});

}

</script>

</body>

</html>
